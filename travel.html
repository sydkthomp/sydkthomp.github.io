<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="travel.css"/>

  <style>
    /* Bigger responsive video */
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding-bottom: 56.25%; /* 16:9 ratio */
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html" style="color:white; font-weight:700; font-size:1.3rem;">Sydney Thompson</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1);"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html" style="color:white;">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="resume.html" style="color:white;">Résumé</a></li>
        <li class="nav-item"><a class="nav-link" href="travel.html" style="color:white;">Travel</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<a name="top"></a>
<div class="hero">
  <div class="hero-text">
    <h1>Sydney's Travel Adventures</h1>
    <p>Exploring the world one passport stamp at a time ✈️</p>
    <a href="#destinations" class="hero-btn">See My Destinations</a>
  </div>
</div>

<!-- Video Section -->
<div class="section video-section">
  <h2 class="section-title">Feel the Wanderlust</h2>
  <p class="video-desc">This video captures exactly how travel makes me feel.</p>

  <div class="video-wrapper">
    <iframe 
      src="https://www.youtube.com/embed/1La4QzGeaaQ"
      title="Travel Video"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</div>

<!-- Back to top -->
<div class="back-top-div">
  <a href="#top" class="back-top">↑ Back to Top</a>
</div>

<div class="footer">
