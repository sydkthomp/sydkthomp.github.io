<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer: Travel Trivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #264653;
            --accent: #e76f51;
            --light: #f4f1de;
            --success: #8ab17d;
            --error: #e63946;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            color: #333;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .image-box {
            width: 100%;
            height: 250px;
            background-color: #f0f0f0;
            border-radius: 15px;
            margin-bottom: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #ddd;
        }

        .landmark-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Hidden until loaded */
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: 2px solid #eee;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { border-color: var(--primary); background: #f0fdfa; }
        button.correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

        #progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
        #hint-text { font-style: italic; color: var(--accent); min-height: 25px; margin-bottom: 5px; font-size: 0.9rem; }
        .hidden { display: none; }
        .nav-btn { background: var(--primary); color: white; width: 100%; border: none; margin-top: 10px; padding: 15px; font-size: 1.1rem; }
        .hint-btn { background: #f8f9fa; border: 1px dashed #ccc; font-size: 0.8rem; margin-top: 10px; width: 60%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen">
            <h1>🌍 Global Explorer</h1>
            <p>Identify the country from the landmark!</p>
            <button onclick="startGame()" class="nav-btn">Start Game</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <p>Question <span id="q-num">1</span> of 10</p>
            
            <div class="image-box" id="img-box">
                <div class="loader" id="loader"></div>
                <img id="landmark-photo" class="landmark-img" src="" alt="Landmark">
            </div>

            <div id="hint-text"></div>
            <h2>Which country is this?</h2>
            <div class="options-grid" id="options"></div>
            <button id="hint-button" class="hint-btn" onclick="showHint()">Stuck? Reveal Landmark Name</button>
        </div>

        <div id="result-screen" class="hidden">
            <h1>Trip Finished!</h1>
            <p>Score: <span id="final-score">0</span>/10</p>
            <div id="rank-msg"></div>
            <button onclick="location.reload()" class="nav-btn">Restart Journey</button>
        </div>
    </div>

    <script>
        // Using direct Source IDs from Unsplash for maximum stability
        const triviaData = [
            { id: "i_X99VInW3Q", country: "India", landmark: "The Taj Mahal" },
            { id: "v9onv7Mr6qk", country: "France", landmark: "The Eiffel Tower" },
            { id: "5Rhl-9LAsiI", country: "Italy", landmark: "The Colosseum" },
            { id: "S0_S55GvW_k", country: "Japan", landmark: "Mount Fuji" },
            { id: "T67_Z_H_Z_M", country: "Egypt", landmark: "The Great Pyramids" },
            { id: "mS_F_8aT-No", country: "Italy", landmark: "Venice Canals" },
            { id: "9M66C_4_v4M", country: "United Kingdom", landmark: "Big Ben" },
            { id: "napS_j_Wno4", country: "China", landmark: "The Great Wall" },
            { id: "8M6K-z94-Is", country: "Peru", landmark: "Machu Picchu" },
            { id: "73_kHNooUoM", country: "Australia", landmark: "Sydney Opera House" }
        ];

        const allCountries = ["Brazil", "Canada", "Germany", "Mexico", "Thailand", "Greece", "USA", "Spain", "South Africa", "Turkey", "Vietnam", "Norway", "Chile", "Morocco"];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const data = triviaData[currentQuestion];
            const img = document.getElementById('landmark-photo');
            const loader = document.getElementById('loader');

            // Set source and handle loading state
            img.style.display = 'none';
            loader.style.display = 'block';
            img.src = `https://images.unsplash.com/photo-${data.id}?auto=format&fit=crop&w=600&q=80`;

            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
            };

            // If image fails, reveal hint automatically
            img.onerror = () => {
                loader.style.display = 'none';
                showHint();
            };

            document.getElementById('q-num').innerText = currentQuestion + 1;
            document.getElementById('hint-text').innerText = "";
            document.getElementById('hint-button').style.display = 'inline-block';
            document.getElementById('progress-bar').style.width = ((currentQuestion) / triviaData.length) * 100 + "%";

            let options = [data.country];
            while(options.length < 4) {
                let randomCountry = allCountries[Math.floor(Math.random() * allCountries.length)];
                if(!options.includes(randomCountry)) options.push(randomCountry);
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function showHint() {
            document.getElementById('hint-text').innerText = "📍 Landmark: " + triviaData[currentQuestion].landmark;
            document.getElementById('hint-button').style.display = 'none';
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const correct = triviaData[currentQuestion].country;
            const allBtns = document.querySelectorAll('#options button');

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if(b.innerText === correct) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < triviaData.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('rank-msg').innerText = score > 7 ? "You're a First-Class Traveler!" : "Better luck on your next trip!";
        }
    </script>
</body>
</html>
