<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Trivia Kahoot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  border-radius: 12px;
  margin: 15px 0;
}

/* Kahoot-style answers */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.answer-btn {
  padding: 20px;
  font-size: 1.2rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}

.red { background: #e74c3c; }
.blue { background: #3498db; }
.yellow { background: #f1c40f; color: black; }
.green { background: #2ecc71; }

.correct {
  outline: 4px solid #00ffcc;
}

.wrong {
  opacity: 0.4;
}

#nextBtn {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 1.1rem;
  border: none;
  border-radius: 10px;
  background: #ff7a18;
  color: white;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌍 Travel Trivia Kahoot</h1>
  <h3 id="score">Score: 0</h3>

  <img id="image" src="">

  <div class="answers" id="answers"></div>

  <button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<script>
const questions = [
  {
    image: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34", // Eiffel Tower
    correct: "France",
    options: ["Italy", "France", "Spain", "Germany"]
  },
  {
    image: "https://images.unsplash.com/photo-1549692520-acc6669e2f0c", // Tokyo street
    correct: "Japan",
    options: ["China", "Japan", "Thailand", "South Korea"]
  },
  {
    image: "https://images.unsplash.com/photo-1505761671935-60b3a7427bad", // NYC skyline
    correct: "United States",
    options: ["Canada", "United States", "UK", "Australia"]
  },
  {
    image: "https://images.unsplash.com/photo-1526481280691-9061c4a3b5a3", // Rio
    correct: "Brazil",
    options: ["Mexico", "Brazil", "Argentina", "Spain"]
  },
  {
    image: "https://images.unsplash.com/photo-1533106418989-88406c7cc8ca", // Sydney Opera House
    correct: "Australia",
    options: ["New Zealand", "Australia", "USA", "Canada"]
  }
];

let current = 0;
let score = 0;

const colors = ["red","blue","yellow","green"];

function loadQuestion() {
  const q = questions[current];
  document.getElementById("image").src = q.image;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  q.options.forEach((option, index) => {
    const btn = document.createElement("button");
    btn.innerText = option;
    btn.classList.add("answer-btn", colors[index]);
    btn.onclick = () => checkAnswer(btn, option);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(button, answer) {
  const correct = questions[current].correct;
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach(btn => btn.disabled = true);

  if (answer === correct) {
    button.classList.add("correct");
    score++;
  } else {
    button.classList.add("wrong");
    buttons.forEach(btn => {
      if (btn.innerText === correct) {
        btn.classList.add("correct");
      }
    });
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    document.querySelector(".container").innerHTML =
      `<h1>🎉 Game Over!</h1>
       <h2>Your Score: ${score}/${questions.length}</h2>
       <button onclick="location.reload()">Play Again</button>`;
  }
}

loadQuestion();
</script>

</body>
</html>
