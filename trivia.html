<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer: Guaranteed Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #1e293b;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-card {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .img-container {
            width: 100%;
            height: 250px;
            background: #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            background: #eff6ff;
        }

        button.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }

        button.wrong {
            background-color: var(--error);
            color: white;
            border-color: var(--error);
        }

        #progress {
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #progress-inner {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .hidden { display: none; }
        h1 { font-size: 1.5rem; margin-top: 0; color: #0f172a; }
        p { color: #64748b; }
    </style>
</head>
<body>

<div id="app-card">
    <div id="start-screen">
        <h1>🌍 World Tour Trivia</h1>
        <p>Can you guess the country based on the scenery? 100% uptime guaranteed.</p>
        <button onclick="start()" style="width: 100%; background: var(--primary); color: white; border: none;">Begin Adventure</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="progress"><div id="progress-inner"></div></div>
        <div class="img-container">
            <img id="main-img" src="" alt="Travel Destination">
        </div>
        <h2 id="question-text" style="font-size: 1.1rem; margin-bottom: 20px;">Which country is this?</h2>
        <div id="options" class="options-list"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="result-title">Complete!</h1>
        <p>Your score: <span id="final-score">0</span>/5</p>
        <button onclick="location.reload()" style="width: 100%; background: var(--secondary); color: white; border: none;">Play Again</button>
    </div>
</div>

<script>
    /* Using Picsum IDs. These are highly reliable developer images 
       that represent global landscapes and cities.
    */
    const trivia = [
        { id: "10", country: "Canada", hint: "Mountains and Lakes" },
        { id: "1016", country: "United States", hint: "Canyons and Desert" },
        { id: "1015", country: "France", hint: "Riverbanks and History" },
        { id: "1039", country: "Brazil", hint: "Waterfalls and Tropics" },
        { id: "1043", country: "Germany", hint: "Castles and Forests" }
    ];

    const distractors = ["Japan", "Australia", "India", "Egypt", "Italy", "Mexico", "China", "Spain"];
    
    let currentIdx = 0;
    let score = 0;
    let busy = false;

    function start() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        render();
    }

    function render() {
        busy = false;
        const q = trivia[currentIdx];
        const img = document.getElementById('main-img');
        
        // Using Picsum's stable static URL format
        img.src = `https://picsum.photos/id/${q.id}/600/400`;
        
        document.getElementById('progress-inner').style.width = (currentIdx / trivia.length * 100) + "%";

        // Shuffle Options
        let choices = [q.country];
        while(choices.length < 4) {
            let pick = distractors[Math.floor(Math.random() * distractors.length)];
            if(!choices.includes(pick)) choices.push(pick);
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options');
        container.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => check(choice, btn);
            container.appendChild(btn);
        });
    }

    function check(choice, btn) {
        if(busy) return;
        busy = true;
        
        const correct = trivia[currentIdx].country;
        const allBtns = document.querySelectorAll('#options button');

        if(choice === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentIdx++;
            if(currentIdx < trivia.length) {
                render();
            } else {
                finish();
            }
        }, 1500);
    }

    function finish() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        if(score === 5) document.getElementById('result-title').innerText = "Expert Traveler! 🏆";
    }
</script>

</body>
</html>
