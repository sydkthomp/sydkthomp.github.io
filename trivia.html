<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer: Travel Trivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2a9d8f;
            --secondary: #264653;
            --accent: #e76f51;
            --light: #f4f1de;
            --success: #8ab17d;
            --error: #e63946;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secondary);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            color: #333;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Image handling with a gray fallback if link fails */
        .image-box {
            width: 100%;
            height: 250px;
            background-color: #e9ecef;
            border-radius: 15px;
            margin-bottom: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .landmark-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: 2px solid #eee;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f0fdfa;
        }

        button.correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        button.wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

        #progress-container {
            width: 100%; height: 8px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden;
        }

        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        #hint-text { font-style: italic; color: var(--accent); height: 20px; margin-bottom: 10px; font-size: 0.9rem; }

        .hidden { display: none; }
        .nav-btn { background: var(--primary); color: white; width: 100%; border: none; margin-top: 10px; }
        .hint-btn { background: #f8f9fa; border: 1px dashed #ccc; font-size: 0.8rem; margin-top: 10px; width: 50%; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen">
            <h1>🌍 Global Explorer</h1>
            <p>Can you identify the country from a single photo?</p>
            <button onclick="startGame()" class="nav-btn">Start Journey</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="progress-container"><div id="progress-bar"></div></div>
            <p>Question <span id="q-num">1</span> of 10</p>
            <div class="image-box">
                <img id="landmark-photo" class="landmark-img" src="" alt="Landmark" onerror="this.style.opacity='0'; document.getElementById('hint-button').click();">
            </div>
            <div id="hint-text"></div>
            <h2>Which country is this?</h2>
            <div class="options-grid" id="options"></div>
            <button id="hint-button" class="hint-btn" onclick="showHint()">Need a hint?</button>
        </div>

        <div id="result-screen" class="hidden">
            <h1>Adventure Complete!</h1>
            <p>Your Final Score: <span id="final-score">0</span>/10</p>
            <div id="rank-msg"></div>
            <button onclick="location.reload()" class="nav-btn">Play Again</button>
        </div>
    </div>

    <script>
        // Updated with the most reliable high-resolution links available
        const triviaData = [
            { img: "https://www.worldatlas.com/upload/bb/94/e7/shutterstock-180423581.jpg", country: "India", landmark: "The Taj Mahal" },
            { img: "https://www.worldatlas.com/upload/ce/90/73/shutterstock-102553753.jpg", country: "France", landmark: "The Eiffel Tower" },
            { img: "https://www.worldatlas.com/upload/05/92/7d/shutterstock-574229443.jpg", country: "Italy", landmark: "The Colosseum" },
            { img: "https://www.worldatlas.com/upload/0a/61/88/shutterstock-615652160.jpg", country: "Japan", landmark: "Mount Fuji" },
            { img: "https://www.worldatlas.com/upload/94/2c/3a/shutterstock-111005822.jpg", country: "Egypt", landmark: "The Great Pyramids" },
            { img: "https://www.worldatlas.com/upload/c2/85/33/shutterstock-521914102.jpg", country: "Italy", landmark: "The Canals of Venice" },
            { img: "https://www.worldatlas.com/upload/30/8a/85/shutterstock-115147048.jpg", country: "United Kingdom", landmark: "Big Ben" },
            { img: "https://www.worldatlas.com/upload/90/a1/38/shutterstock-401736274.jpg", country: "China", landmark: "The Great Wall" },
            { img: "https://www.worldatlas.com/upload/7a/61/89/shutterstock-258055661.jpg", country: "Peru", landmark: "Machu Picchu" },
            { img: "https://www.worldatlas.com/upload/a9/37/10/shutterstock-126207551.jpg", country: "Australia", landmark: "The Sydney Opera House" }
        ];

        const allCountries = ["Brazil", "Canada", "Germany", "Mexico", "Thailand", "Greece", "USA", "Spain", "South Africa", "Turkey", "Vietnam", "Norway", "Chile", "Morocco"];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const data = triviaData[currentQuestion];
            const imgElement = document.getElementById('landmark-photo');
            
            imgElement.style.opacity = '1';
            imgElement.src = data.img;
            
            document.getElementById('q-num').innerText = currentQuestion + 1;
            document.getElementById('hint-text').innerText = "";
            document.getElementById('hint-button').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = ((currentQuestion) / triviaData.length) * 100 + "%";

            let options = [data.country];
            while(options.length < 4) {
                let randomCountry = allCountries[Math.floor(Math.random() * allCountries.length)];
                if(!options.includes(randomCountry)) options.push(randomCountry);
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function showHint() {
            document.getElementById('hint-text').innerText = "Clue: " + triviaData[currentQuestion].landmark;
            document.getElementById('hint-button').classList.add('hidden');
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const correct = triviaData[currentQuestion].country;
            const allBtns = document.querySelectorAll('#options button');

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if(b.innerText === correct) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < triviaData.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let msg = score >= 8 ? "Grand Explorer! You're ready for takeoff!" : "Time to study the map and try again!";
            document.getElementById('rank-msg').innerText = msg;
        }
    </script>
</body>
</html>
